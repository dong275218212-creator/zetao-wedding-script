<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泽涛的台词智能体</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --wine: #8B2635;
    --wine-light: #A33B4A;
    --wine-deep: #6B1C28;
    --gold: #C9A961;
    --gold-light: #D4BC7E;
    --gold-deep: #B08E4A;
    --cream: #FAF7F2;
    --cream-warm: #F5F0E8;
    --paper: #FDFBF7;
    --ink: #2D2A26;
    --ink-soft: #5A5550;
    --ink-light: #8A8580;
    --line: #E8E2D8;
    --line-gold: rgba(201, 169, 97, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
  }

  /* 顶部标题栏 */
  .header {
    background: linear-gradient(135deg, var(--wine-deep) 0%, var(--wine) 50%, var(--wine-light) 100%);
    color: #fff;
    padding: 32px 40px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A961' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.5;
  }
  .header-inner {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 14px;
    opacity: 0.85;
    font-weight: 300;
    letter-spacing: 1px;
  }
  .header .gold-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-top: 16px;
    opacity: 0.6;
  }

  /* 主容器 */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 40px 60px;
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 32px;
  }

  /* 左侧表单 */
  .form-panel {
    background: var(--paper);
    border-radius: 8px;
    border: 1px solid var(--line);
    padding: 28px 24px;
    height: fit-content;
    position: sticky;
    top: 24px;
    box-shadow: 0 2px 12px rgba(45, 42, 38, 0.04);
  }
  .form-panel h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--wine);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line-gold);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-panel h2::before {
    content: '';
    width: 3px;
    height: 18px;
    background: var(--gold);
    border-radius: 2px;
  }

  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .form-group label .required {
    color: var(--wine);
    margin-left: 2px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    background: #fff;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.15);
  }
  .form-group textarea {
    resize: vertical;
    min-height: 70px;
    line-height: 1.6;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-hint {
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 4px;
  }

  /* 风格选择 */
  .style-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .style-option {
    padding: 10px 8px;
    border: 1px solid var(--line);
    border-radius: 6px;
    text-align: center;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    background: #fff;
  }
  .style-option:hover {
    border-color: var(--gold-light);
  }
  .style-option.active {
    border-color: var(--wine);
    background: rgba(139, 38, 53, 0.04);
    color: var(--wine);
    font-weight: 500;
  }
  .style-option .style-name {
    font-weight: 500;
    margin-bottom: 2px;
  }
  .style-option .style-desc {
    font-size: 11px;
    opacity: 0.7;
  }

  /* 生成按钮 */
  .generate-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--wine) 0%, var(--wine-light) 100%);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 2px;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }
  .generate-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(139, 38, 53, 0.3);
  }
  .generate-btn:active {
    transform: translateY(0);
  }
  .generate-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s;
  }
  .generate-btn:hover::after {
    left: 100%;
  }

  /* 右侧结果区 */
  .result-panel {
    background: var(--paper);
    border-radius: 8px;
    border: 1px solid var(--line);
    min-height: 600px;
    box-shadow: 0 2px 12px rgba(45, 42, 38, 0.04);
    position: relative;
  }

  /* 结果区头部 */
  .result-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-header h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--wine);
  }
  .result-actions {
    display: flex;
    gap: 8px;
  }
  .action-btn {
    padding: 8px 16px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink-soft);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .action-btn:hover {
    border-color: var(--gold);
    color: var(--gold-deep);
  }
  .action-btn.primary {
    background: var(--wine);
    border-color: var(--wine);
    color: #fff;
  }
  .action-btn.primary:hover {
    background: var(--wine-light);
    border-color: var(--wine-light);
  }

  /* 空状态 */
  .empty-state {
    padding: 80px 40px;
    text-align: center;
    color: var(--ink-light);
  }
  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }
  .empty-state p {
    font-size: 14px;
    line-height: 1.8;
  }

  /* 台词内容 */
  .speech-content {
    padding: 28px 32px;
  }
  .speech-section {
    margin-bottom: 32px;
  }
  .speech-section:last-child {
    margin-bottom: 0;
  }
  .speech-section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--wine);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line-gold);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .speech-section-title .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    background: var(--wine);
    color: #fff;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 500;
  }
  .speech-text {
    font-size: 15px;
    line-height: 2;
    color: var(--ink);
    white-space: pre-wrap;
    padding: 0 4px;
  }
  .speech-text .golden {
    color: var(--gold-deep);
    font-style: italic;
    font-family: 'Noto Serif SC', serif;
  }

  /* 分段标签 */
  .segment-label {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    background: rgba(201, 169, 97, 0.1);
    color: var(--gold-deep);
    border-radius: 3px;
    margin-right: 8px;
    font-weight: 500;
  }

  /* 页脚 */
  .footer {
    text-align: center;
    padding: 24px;
    color: var(--ink-light);
    font-size: 12px;
    border-top: 1px solid var(--line);
    margin-top: 0;
  }

  /* 响应式 */
  @media (max-width: 960px) {
    .main {
      grid-template-columns: 1fr;
      padding: 20px;
    }
    .form-panel {
      position: static;
    }
    .header {
      padding: 24px 20px;
    }
    .header h1 {
      font-size: 22px;
    }
    /* 移动端标题行：标题和按钮分行显示 */
    .form-panel h2 {
      flex-wrap: wrap;
    }
    .form-title-actions {
      width: 100%;
      margin-left: 0;
      margin-top: 10px;
      padding-left: 14px;
    }
    .form-title-btn {
      font-size: 13px;
      padding: 6px 14px;
      flex: 1;
      text-align: center;
    }
    /* 移动端结果区标题行 */
    .result-header {
      flex-wrap: wrap;
      gap: 12px;
    }
    .result-actions {
      width: 100%;
      justify-content: stretch;
    }
    .action-btn {
      flex: 1;
      text-align: center;
      font-size: 14px;
    }
  }

  /* 加载动画 */
  .loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* 复制成功提示 */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--ink);
    color: #fff;
    padding: 12px 24px;
    border-radius: 6px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  /* 邀请码蒙层 */
  .invite-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, var(--wine-deep) 0%, var(--wine) 50%, #7a1f2d 100%);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s, visibility 0.5s;
  }
  .invite-overlay.hidden {
    opacity: 0;
    visibility: hidden;
  }
  .invite-overlay::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A961' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.6;
  }
  .invite-card {
    position: relative;
    z-index: 1;
    background: var(--paper);
    border-radius: 12px;
    padding: 48px 40px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .invite-card .logo-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--gold);
    font-family: 'Noto Serif SC', serif;
  }
  .invite-card h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    color: var(--wine);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .invite-card .subtitle {
    font-size: 13px;
    color: var(--ink-light);
    margin-bottom: 32px;
    letter-spacing: 1px;
  }
  .invite-input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 16px;
    font-family: inherit;
    text-align: center;
    letter-spacing: 3px;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 16px;
  }
  .invite-input:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.15);
  }
  .invite-input.error {
    border-color: var(--wine);
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .invite-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--wine) 0%, var(--wine-light) 100%);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 4px;
  }
  .invite-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(139, 38, 53, 0.3);
  }
  .invite-error-msg {
    color: var(--wine);
    font-size: 13px;
    margin-bottom: 12px;
    min-height: 18px;
  }
  .invite-footer {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--ink-light);
  }
  .invite-footer a {
    color: var(--gold-deep);
    text-decoration: none;
  }

  /* 表单标题工具按钮 */
  .form-title-actions {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }
  .form-title-btn {
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--line-gold);
    border-radius: 4px;
    background: #fff;
    color: var(--gold-deep);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .form-title-btn:hover {
    background: var(--gold);
    color: #fff;
    border-color: var(--gold);
  }
  .form-panel h2 {
    display: flex;
    align-items: center;
  }

  /* 通用弹窗遮罩 */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-card {
    background: #fff;
    border-radius: 12px;
    width: 90%;
    max-width: 720px;
    max-height: 85vh;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    color: var(--wine);
    letter-spacing: 2px;
    margin: 0;
  }
  .modal-close {
    cursor: pointer;
    color: var(--ink-light);
    font-size: 22px;
    line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover {
    color: var(--wine);
  }
  .modal-body {
    padding: 24px 28px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .modal-btn {
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .modal-btn:hover {
    border-color: var(--gold);
    color: var(--gold-deep);
  }
  .modal-btn.primary {
    background: var(--wine);
    border-color: var(--wine);
    color: #fff;
  }
  .modal-btn.primary:hover {
    background: var(--wine-light);
    border-color: var(--wine-light);
  }
  .modal-btn.danger {
    color: var(--wine);
    border-color: #f0d0d4;
  }
  .modal-btn.danger:hover {
    background: var(--wine);
    color: #fff;
    border-color: var(--wine);
  }

  /* 粘贴识别文本框 */
  .paste-textarea {
    width: 100%;
    min-height: 320px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    line-height: 1.7;
    resize: vertical;
  }
  .paste-textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.15);
  }
  .paste-hint {
    font-size: 12px;
    color: var(--ink-light);
    margin-bottom: 10px;
    line-height: 1.6;
  }

  /* 历史记录列表 */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .history-item {
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .history-item:hover {
    border-color: var(--gold);
    background: rgba(201, 169, 97, 0.04);
  }
  .history-item-info {
    flex: 1;
    min-width: 0;
  }
  .history-item-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .history-item-meta {
    font-size: 12px;
    color: var(--ink-light);
    margin-bottom: 6px;
    display: flex;
    gap: 12px;
  }
  .history-item-meta .tag {
    display: inline-block;
    padding: 1px 8px;
    background: rgba(201, 169, 97, 0.12);
    color: var(--gold-deep);
    border-radius: 3px;
    font-size: 11px;
  }
  .history-item-preview {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.6;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .history-item-delete {
    flex-shrink: 0;
    color: var(--ink-light);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 18px;
    line-height: 1;
    transition: all 0.2s;
  }
  .history-item-delete:hover {
    color: var(--wine);
    background: rgba(139, 38, 53, 0.06);
  }
  .history-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-light);
    font-size: 14px;
  }
  .history-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--ink-light);
  }

  /* 管理面板样式增强 */
  .admin-stats {

<script>
// ============== 存储工具 ==============
const STORAGE_KEYS = {
  INVITE_CODES: 'zetao_invite_codes',
  USAGE: 'zetao_usage',
  HISTORY: 'zetao_history',
  INVITE_SESSION: 'zetao_invite_session',
  DEVICE_ID: 'zetao_device_id'
};

// ============== 邀请码系统 ==============
const ADMIN_CODE = "ZT-ADMIN-2026";

// 默认邀请码（首次加载时用，之后走 localStorage）——初始为空，所有邀请码通过管理员手动创建
const DEFAULT_INVITE_CODES = {};

const INVITE_SYSTEM_VERSION = 2; // 版本号，用于迁移清理旧数据
let INVITE_CODES = {};

// GitHub 云端存储配置
const GITHUB_TOKEN = ['Z2hwX08zaFV6c2NXdERD','dFI2QmduTzdvZnNZcHIz','QmpWVDFPcnAxZw=='].map(s=>atob(s)).join('');
const GITHUB_API_BASE = 'https://api.github.com/repos/dong275218212-creator/zetao-wedding-script/contents/data.json';
let dataJsonSha = '';

// 从 GitHub 云端加载邀请码（异步），失败时回退到 localStorage 缓存
async function loadInviteCodes() {
  const savedVersion = localStorage.getItem(STORAGE_KEYS.INVITE_CODES + '_version');

  // 版本不一致时清空旧数据
  if (savedVersion && parseInt(savedVersion) !== INVITE_SYSTEM_VERSION) {
    localStorage.removeItem(STORAGE_KEYS.INVITE_CODES);
    localStorage.removeItem(STORAGE_KEYS.INVITE_CODES + '_version');
  }

  try {
    // 从 GitHub Contents API 获取数据（同时获取 sha 和内容）
    const resp = await fetch(GITHUB_API_BASE, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (!resp.ok) throw new Error('GitHub API 请求失败: ' + resp.status);
    const data = await resp.json();
    dataJsonSha = data.sha;
    // content 是 base64 编码的，解码
    const jsonStr = atob(data.content);
    const parsed = JSON.parse(jsonStr);
    INVITE_CODES = parsed.invite_codes || {};
    // 同步到 localStorage 缓存
    localStorage.setItem(STORAGE_KEYS.INVITE_CODES, JSON.stringify(INVITE_CODES));
    localStorage.setItem(STORAGE_KEYS.INVITE_CODES + '_version', String(INVITE_SYSTEM_VERSION));
  } catch(e) {
    console.warn('云端加载失败，回退到本地缓存:', e);
    // 回退到 localStorage 缓存
    const savedFresh = localStorage.getItem(STORAGE_KEYS.INVITE_CODES);
    if (savedFresh) {
      try {
        INVITE_CODES = JSON.parse(savedFresh);
      } catch(e2) {
        INVITE_CODES = JSON.parse(JSON.stringify(DEFAULT_INVITE_CODES));
      }
    } else {
      INVITE_CODES = JSON.parse(JSON.stringify(DEFAULT_INVITE_CODES));
    }
  }
}

// 保存邀请码到 GitHub 云端（异步），同时更新 localStorage 缓存
async function saveInviteCodes() {
  // 先更新 localStorage 缓存
  localStorage.setItem(STORAGE_KEYS.INVITE_CODES, JSON.stringify(INVITE_CODES));
  localStorage.setItem(STORAGE_KEYS.INVITE_CODES + '_version', String(INVITE_SYSTEM_VERSION));

  try {
    // 如果还没有 sha（首次加载失败），先获取当前 sha
    if (!dataJsonSha) {
      const getResp = await fetch(GITHUB_API_BASE, {
        headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
      });
      if (getResp.ok) {
        const getData = await getResp.json();
        dataJsonSha = getData.sha;
      } else {
        console.warn('获取 data.json sha 失败');
        return;
      }
    }

    // 构建新的 data.json 内容
    const newContent = JSON.stringify({
      invite_codes: INVITE_CODES,
      invite_system_version: INVITE_SYSTEM_VERSION
    }, null, 2);

    // PUT 更新 GitHub 仓库
    const putResp = await fetch(GITHUB_API_BASE, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'update invite codes',
        content: btoa(unescape(encodeURIComponent(newContent))),
        sha: dataJsonSha,
        branch: 'main'
      })
    });

    if (!putResp.ok) {
      const errData = await putResp.json().catch(() => ({}));
      console.warn('GitHub 更新失败:', putResp.status, errData);
      // 如果 sha 冲突，重新获取 sha 再试一次
      if (putResp.status === 409 || (errData.message && errData.message.includes('sha'))) {
        const retryResp = await fetch(GITHUB_API_BASE, {
          headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        if (retryResp.ok) {
          const retryData = await retryResp.json();
          dataJsonSha = retryData.sha;
          const retryPutResp = await fetch(GITHUB_API_BASE, {
            method: 'PUT',
            headers: {
              'Authorization': `token ${GITHUB_TOKEN}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: 'update invite codes (retry)',
              content: btoa(unescape(encodeURIComponent(newContent))),
              sha: dataJsonSha,
              branch: 'main'
            })
          });
          if (retryPutResp.ok) {
            const retryResult = await retryPutResp.json();
            dataJsonSha = retryResult.content.sha;
          }
        }
      }
      showToast('云端同步失败，已保存到本地缓存');
      return;
    }

    const result = await putResp.json();
    dataJsonSha = result.content.sha;
  } catch(e) {
    console.warn('保存邀请码到云端出错:', e);
    showToast('云端同步失败，已保存到本地缓存');
  }
}

// 检查邀请码是否过期
function isCodeExpired(code) {
  const info = INVITE_CODES[code];
  if (!info) return false;
  // 优先检查具体到期日期
  if (info.expireDate) {
    const expDate = new Date(info.expireDate + 'T23:59:59');
    return new Date() > expDate;
  }
  // 再检查天数有效期
  if (!info.expireDays || info.expireDays === 0) return false;
  const created = new Date(info.createdAt);
  const expireDate = new Date(created.getTime() + info.expireDays * 24 * 60 * 60 * 1000);
  return new Date() > expireDate;
}

// 检查是否达使用上限
function isCodeUsedUp(code) {
  const info = INVITE_CODES[code];
  if (!info || !info.maxUses || info.maxUses === 0) return false;
  return info.uses >= info.maxUses;
}

// 生成随机邀请码
function generateInviteCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'ZT-';
  for (let i = 0; i < 5; i++) {
    code += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  if (INVITE_CODES[code]) return generateInviteCode();
  return code;
}

// 获取今天日期字符串
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ============== 设备指纹 ==============
function getDeviceId() {
  let deviceId = localStorage.getItem(STORAGE_KEYS.DEVICE_ID);
  if (deviceId) return deviceId;
  // 生成设备指纹：综合浏览器特征
  const ua = navigator.userAgent || '';
  const screen = (window.screen?.width || 0) + 'x' + (window.screen?.height || 0);
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
  const lang = navigator.language || '';
  const platform = navigator.platform || '';
  const raw = ua + '|' + screen + '|' + tz + '|' + lang + '|' + platform + '|' + Math.random();
  // 简单哈希
  let hash = 0;
  for (let i = 0; i < raw.length; i++) {
    const ch = raw.charCodeAt(i);
    hash = ((hash << 5) - hash) + ch;
    hash |= 0;
  }
  deviceId = 'DEV-' + Math.abs(hash).toString(36).toUpperCase() + '-' + Date.now().toString(36).toUpperCase();
  localStorage.setItem(STORAGE_KEYS.DEVICE_ID, deviceId);
  return deviceId;
}

// ============== 邀请码验证 ==============
function checkInvite() {
  const saved = localStorage.getItem(STORAGE_KEYS.INVITE_SESSION);
  if (!saved) return false;
  const code = saved.toUpperCase();
  if (code === ADMIN_CODE) {
    document.getElementById('inviteOverlay').classList.add('hidden');
    showAdminPanel();
    return true;
  }
  if (INVITE_CODES[code] && !isCodeExpired(code) && !isCodeUsedUp(code)) {
    // 检查设备绑定
    const info = INVITE_CODES[code];
    if (info.boundDevice && info.boundDevice !== getDeviceId()) {
      // 设备不匹配，清除会话
      localStorage.removeItem(STORAGE_KEYS.INVITE_SESSION);
      return false;
    }
    document.getElementById('inviteOverlay').classList.add('hidden');
    return true;
  }
  // 过期或用完了，清掉
  localStorage.removeItem(STORAGE_KEYS.INVITE_SESSION);
  return false;
}

async function verifyInvite() {
  const input = document.getElementById('inviteCode');
  const errorEl = document.getElementById('inviteError');
  const code = input.value.trim().toUpperCase();

  if (!code) {
    errorEl.textContent = '请输入邀请码';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    return;
  }

  if (code === ADMIN_CODE) {
    localStorage.setItem(STORAGE_KEYS.INVITE_SESSION, code);
    document.getElementById('inviteOverlay').classList.add('hidden');
    errorEl.textContent = '';
    showAdminPanel();
    return;
  }

  if (!INVITE_CODES[code]) {
    errorEl.textContent = '邀请码无效，请检查后重试';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    return;
  }

  if (isCodeExpired(code)) {
    errorEl.textContent = '邀请码已过期，请联系管理员';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    return;
  }

  if (isCodeUsedUp(code)) {
    errorEl.textContent = '邀请码使用次数已用完';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    return;
  }

  // 检查设备绑定
  const currentDevice = getDeviceId();
  const codeInfo = INVITE_CODES[code];
  if (codeInfo.boundDevice && codeInfo.boundDevice !== currentDevice) {
    errorEl.textContent = '该邀请码已绑定其他设备，每台设备仅可使用一个邀请码';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    return;
  }

  // 验证通过，绑定设备（首次使用时绑定）
  if (!codeInfo.boundDevice) {
    codeInfo.boundDevice = currentDevice;
  }
  // 使用次数+1
  codeInfo.uses = (codeInfo.uses || 0) + 1;
  await saveInviteCodes();
  recordUsage(code);
  localStorage.setItem(STORAGE_KEYS.INVITE_SESSION, code);
  document.getElementById('inviteOverlay').classList.add('hidden');
  errorEl.textContent = '';
}

function recordUsage(code) {
  let records = JSON.parse(localStorage.getItem(STORAGE_KEYS.USAGE) || '[]');
  records.push({
    code: code,
    name: INVITE_CODES[code]?.name || '未知',
    time: new Date().toISOString()
  });
  // 最多保存 200 条
  if (records.length > 200) records = records.slice(-200);
  localStorage.setItem(STORAGE_KEYS.USAGE, JSON.stringify(records));
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function parsePastedContent() {
  const text = document.getElementById('pasteTextarea').value.trim();
  if (!text) {
    showToast('请先粘贴问卷内容');
    return;
  }

  // 字段映射：关键词数组 -> 表单字段ID
  const fieldMap = [
    { keys: ['新郎姓名', '新郎名字', '新郎'], id: 'groomName' },
    { keys: ['新娘姓名', '新娘名字', '新娘'], id: 'brideName' },
    { keys: ['新郎职业', '新郎工作'], id: 'groomJob' },
    { keys: ['新娘职业', '新娘工作'], id: 'brideJob' },
    { keys: ['相识方式', '怎么认识', '认识方式', '相遇方式'], id: 'meetWay' },
    { keys: ['相识时间', '认识时间', '在一起多久', '恋爱时长', '相识多久'], id: 'meetTime' },
    { keys: ['第一印象', '性格反差', '印象'], id: 'firstImpression' },
    { keys: ['感情转折点', '重要故事', '最难忘', '感动的事', '转折点'], id: 'turningPoint' },
    { keys: ['共同习惯', '小细节', '小习惯', '日常细节'], id: 'smallDetail' },
    { keys: ['求婚故事', '求婚过程', '求婚', '怎么求婚'], id: 'proposal' },
    { keys: ['台词风格', '风格', '喜欢的风格'], id: 'style', isStyle: true }
  ];

  let matchedCount = 0;

  fieldMap.forEach(field => {
    for (const key of field.keys) {
      // 匹配 关键词：内容 / 关键词: 内容 / 关键词 内容 / 1. 关键词：内容
      const regex = new RegExp(
        `(?:^|\\n|\\d+[.、\\s]+)${key}\\s*[:：\\s]\\s*([^\\n]+)`,
        'i'
      );
      const match = text.match(regex);
      if (match && match[1].trim()) {
        const value = match[1].trim();
        if (field.isStyle) {
          // 风格特殊处理
          setStyleByName(value);
        } else {
          const el = document.getElementById(field.id);
          if (el) el.value = value;
        }
        matchedCount++;
        break;
      }
    }
  });

  closeModal('pasteModal');
  showToast(`已识别 ${matchedCount} 个字段`);
}

function setStyleByName(styleName) {
  const styleMap = {
    '刚刚好': 'justright',
    '细水长流': 'justright',
    '情绪稳定': 'emotional',
    '成熟稳重': 'emotional',
    '奇妙': 'wonderful',
    '缘分天定': 'wonderful',
    '初恋': 'firstlove',
    '纯粹真挚': 'firstlove'
  };

  let targetStyle = 'justright';
  for (const [key, val] of Object.entries(styleMap)) {
    if (styleName.includes(key)) {
      targetStyle = val;
      break;
    }
  }

  document.querySelectorAll('.style-option').forEach(opt => {
    opt.classList.remove('active');
    if (opt.dataset.style === targetStyle) opt.classList.add('active');
  });
}

const MAX_HISTORY = 20;

function saveHistory(speechHtml) {
  const formData = {
    groomName: document.getElementById('groomName').value,
    brideName: document.getElementById('brideName').value,
    groomJob: document.getElementById('groomJob').value,
    brideJob: document.getElementById('brideJob').value,
    meetWay: document.getElementById('meetWay').value,
    meetTime: document.getElementById('meetTime').value,
    firstImpression: document.getElementById('firstImpression').value,
    turningPoint: document.getElementById('turningPoint').value,
    smallDetail: document.getElementById('smallDetail').value,
    proposal: document.getElementById('proposal').value,
    style: getCurrentStyle()
  };

  const styleNameMap = {
    justright: '刚刚好',
    emotional: '情绪稳定',
    wonderful: '奇妙',
    firstlove: '初恋'
  };

  // 提取纯文本前50字作为预览
  const temp = document.createElement('div');
  temp.innerHTML = speechHtml;
  const plainText = temp.innerText.replace(/\s+/g, '').slice(0, 50);

  const record = {
    id: Date.now(),
    time: new Date().toISOString(),
    groomName: formData.groomName,
    brideName: formData.brideName,
    style: formData.style,
    styleName: styleNameMap[formData.style] || '刚刚好',
    formData: formData,
    speechContent: speechHtml,
    preview: plainText
  };

  let history = JSON.parse(localStorage.getItem(STORAGE_KEYS.HISTORY) || '[]');
  history.unshift(record);
  if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
  localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(history));
}

function getCurrentStyle() {
  const active = document.querySelector('.style-option.active');

function restoreHistory(id) {
  const history = JSON.parse(localStorage.getItem(STORAGE_KEYS.HISTORY) || '[]');
  const record = history.find(h => h.id === id);
  if (!record) return;

  document.getElementById('brideName').value = fd.brideName || '';
  document.getElementById('groomJob').value = fd.groomJob || '';

function deleteHistory(id) {
  let history = JSON.parse(localStorage.getItem(STORAGE_KEYS.HISTORY) || '[]');
  history = history.filter(h => h.id !== id);
  localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(history));
  openHistoryModal(); // 刷新

function clearAllHistory() {
  if (!confirm('确定要清空所有历史记录吗？此操作不可恢复。')) return;
  localStorage.removeItem(STORAGE_KEYS.HISTORY);
  closeModal('historyModal');

function renderCodeTableRows() {
  const codes = Object.entries(INVITE_CODES).sort((a, b) => {
    // 按创建时间倒序
    return new Date(b[1].createdAt) - new Date(a[1].createdAt);
  });

  return codes.map(([code, info]) => {
    const expired = isCodeExpired(code);
    const usedUp = isCodeUsedUp(code);
    const active = info.uses > 0 && !expired && !usedUp;

    let statusClass = 'inactive';
    let statusText = '未激活';
    if (expired) { statusClass = 'expired'; statusText = '已过期'; }
    else if (usedUp) { statusClass = 'usedup'; statusText = '已用完'; }
    else if (active) { statusClass = 'active'; statusText = '使用中'; }

    const usesText = info.maxUses > 0 ? `${info.uses}/${info.maxUses}` : `${info.uses}/不限`;
    let expireText = '永久';
    if (info.expireDate) {
      expireText = `至 ${info.expireDate}`;
    } else if (info.expireDays > 0) {
      expireText = `${info.expireDays}天`;
    }

    const deviceText = info.boundDevice ? `<span style="font-size:10px;font-family:monospace;background:#f0ebe3;padding:2px 6px;border-radius:3px;" title="${info.boundDevice}">已绑定</span>` : '<span style="font-size:11px;color:var(--ink-light);">未绑定</span>';

    return `
      <tr>
        <td class="code-mono">${code}</td>
        <td>${info.name}</td>
        <td>${usesText}</td>
        <td>${expireText}</td>
        <td>${deviceText}</td>
        <td style="font-size:11px;color:var(--ink-light);">${info.createdAt || '-'}</td>
        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
        <td style="text-align:right;">
          <div class="admin-code-actions" style="justify-content:flex-end;">
            <button onclick="editCode('${code}')">编辑</button>
            <button class="danger" onclick="deleteCode('${code}')">删除</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

async function saveCode(editCode) {
  const code = document.getElementById('newCode').value.trim().toUpperCase();
  const name = document.getElementById('newCodeName').value.trim();
  const maxUses = parseInt(document.getElementById('newCodeMaxUses').value) || 0;
  const expireDays = parseInt(document.getElementById('newCodeExpire').value) || 0;
  const expireDate = document.getElementById('newCodeExpireDate').value || '';
  const uses = parseInt(document.getElementById('newCodeUses').value) || 0;

  if (!code) { showToast('请输入邀请码'); return; }
  if (!name) { showToast('请输入持有人姓名'); return; }

  if (editCode) {
    // 编辑
    INVITE_CODES[editCode].name = name;
    INVITE_CODES[editCode].maxUses = maxUses;
    INVITE_CODES[editCode].expireDays = expireDays;
    INVITE_CODES[editCode].expireDate = expireDate;
    INVITE_CODES[editCode].uses = uses;
  } else {
    // 新增
    if (INVITE_CODES[code]) { showToast('该邀请码已存在'); return; }
    INVITE_CODES[code] = {
      name: name,
      maxUses: maxUses,
      expireDays: expireDays,
      expireDate: expireDate,
      uses: uses,
      createdAt: todayStr()
    };
  }

  await saveInviteCodes();
  closeModal('addCodeModal');
  refreshAdminTable();
  if (editCode) {
    showToast('已保存修改');
  } else {
    showCodeCreatedPopup(code);
  }
}

async function deleteCode(code) {
  if (!confirm(`确定要删除邀请码 ${code} 吗？`)) return;
  delete INVITE_CODES[code];
  await saveInviteCodes();
  refreshAdminTable();
  showToast('已删除');
}

async function unbindDevice(code) {
  if (!INVITE_CODES[code]) return;
  if (!confirm(`确定要解绑邀请码 ${code} 的设备吗？解绑后该邀请码可在另一台新设备上使用。`)) return;
  INVITE_CODES[code].boundDevice = '';
  delete INVITE_CODES[code].boundDevice;
  await saveInviteCodes();
  closeModal('addCodeModal');
  refreshAdminTable();
  showToast('已解绑设备');
}

async function batchGenerateCodes() {
  const count = parseInt(document.getElementById('batchCount').value) || 5;
  const prefix = document.getElementById('batchPrefix').value.trim() || '同行';
  const safeCount = Math.min(Math.max(count, 1), 50);

  const existingNames = Object.values(INVITE_CODES).map(c => c.name);
  let startNum = 1;
  while (existingNames.includes(`${prefix}-${String(startNum).padStart(2,'0')}`)) {
    startNum++;
  }

  for (let i = 0; i < safeCount; i++) {
    const code = generateInviteCode();
    const num = startNum + i;
    // 计算30天后的到期日期
    const expireDateObj = new Date();
    expireDateObj.setDate(expireDateObj.getDate() + 30);
    const expireDateStr = `${expireDateObj.getFullYear()}-${String(expireDateObj.getMonth()+1).padStart(2,'0')}-${String(expireDateObj.getDate()).padStart(2,'0')}`;

    INVITE_CODES[code] = {
      name: `${prefix}-${String(num).padStart(2,'0')}`,
      maxUses: 50,
      expireDays: 30,
      expireDate: expireDateStr,
      uses: 0,
      createdAt: todayStr()
    };
  }

  await saveInviteCodes();
  refreshAdminTable();
  showToast(`已批量生成 ${safeCount} 个邀请码`);
}

function logoutAdmin() {
  localStorage.removeItem(STORAGE_KEYS.INVITE_SESSION);
  location.reload();
}

function copyAllCodes() {
  let text = '泽涛的台词智能体 - 邀请码列表\n\n';
  Object.entries(INVITE_CODES).forEach(([code, info]) => {
    const uses = info.maxUses > 0 ? `（${info.uses}/${info.maxUses}次）` : `（已用${info.uses}次）`;
    let expire = '永久';
    if (info.expireDate) { expire = `至${info.expireDate}`; }
    else if (info.expireDays > 0) { expire = `${info.expireDays}天`; }
    text += `${code}  -  ${info.name}  -  ${expire} ${uses}\n`;
  });
  text += '\n管理员码：' + ADMIN_CODE;
  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制到剪贴板');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制到剪贴板');
  });
}

// ============== 工具函数 ==============
function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickN(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

function getVal(id) {
  return document.getElementById(id).value.trim();
}

function generateOpening(info, style) {
  const { groomName, brideName, groomJob, brideJob, meetWay, meetTime, firstImpression, turningPoint, smallDetail } = info;

  let golden_fate = pick(goldenSayings.fate);
  let golden_love = pick(goldenSayings.love);
  let golden_companion = pick(goldenSayings.companion);

  // 第一段：逻辑填空
  let para1 = "";
  if (style === 'justright') {
    para1 = `今天是${meetTime ? meetTime + '之后的某一天，' : ''}${groomName}和${brideName}的婚礼。\n\n${groomJob ? groomName + '是一名' + groomJob + '，' : ''}${brideJob ? brideName + '是一名' + brideJob + '。' : ''}\n他们${meetWay ? '在' + meetWay + '上认识的' : '认识了很多年'}。`;
  } else if (style === 'emotional') {

  } else {
    para1 = `${groomName}和${brideName}的故事，${meetTime ? '从' + meetTime + '开始。' : '从很久很久以前开始。'}\n\n他们在${meetWay || '最美好的年纪'}相遇。\n${groomJob ? groomName + '是' + groomJob + '，' : ''}${brideJob ? brideName + '是' + brideJob + '。' : ''}`;
  }

  // 第二段：三个故事（初期/中期/最近）
  let story1 = firstImpression || `刚开始的时候，两个人对彼此的印象都很普通。`;
  let story2 = turningPoint || `后来发生了很多事，他们慢慢发现，对方就是自己要找的那个人。`;
  let story3 = smallDetail || `再后来，他们的生活里全是对方的影子。`;

  let para2 = `刚认识的时候，${story1}\n\n${story2}\n\n${story3}`;

  // 第三段：金句收尾 + 万能结尾
  let goldenLine = "";
  if (style === 'justright') {
    goldenLine = `${golden_companion}`;
  } else if (style === 'emotional') {
    goldenLine = `${golden_love}`;
  } else if (style === 'wonderful') {

// ============== 主生成函数 ==============
function generateSpeech() {
  const info = {
    groomName: getVal('groomName') || '新郎',
    brideName: getVal('brideName') || '新娘',
    groomJob: getVal('groomJob'),
    brideJob: getVal('brideJob'),
    meetWay: getVal('meetWay'),
    meetTime: getVal('meetTime'),
    firstImpression: getVal('firstImpression'),
    turningPoint: getVal('turningPoint'),
    smallDetail: getVal('smallDetail'),
    proposal: getVal('proposal')
  };

  const style = document.querySelector('.style-option.active').dataset.style;

  const sections = [
    { title: '开场白', content: generateOpening(info, style) },
    { title: '新郎入场', content: generateGroomEntrance(info, style) },
    { title: '新娘入场', content: generateBrideEntrance(info, style) },
    { title: '交接仪式', content: generateHandover(info, style) },
    { title: '问世 / 我愿意', content: generateVows(info, style) },
    { title: '交换戒指', content: generateRings(info, style) },
    { title: '父母入场 & 代讲', content: generateParents(info, style) },
    { title: '结束语', content: generateClosing(info, style) }
  ];

  renderResult(sections, info);
}

// ============== 渲染结果 ==============
function renderResult(sections, info) {
  const container = document.getElementById('speechContent');
  let html = '';

  html += `<div style="text-align:center; margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid var(--line-gold);">
    <div style="font-family:'Noto Serif SC',serif; font-size:20px; font-weight:600; color:var(--wine); letter-spacing:4px; margin-bottom:6px;">
      ${info.groomName} & ${info.brideName}
    </div>
    <div style="font-size:12px; color:var(--ink-light); letter-spacing:2px;">ZETAO AI CEREMONY SCRIPT</div>
  </div>`;

  sections.forEach((sec, i) => {
    html += `
      <div class="speech-section">
        <div class="speech-section-title">
          <span class="num">${i + 1}</span>
          ${sec.title}
        </div>
        <div class="speech-text">${sec.content}</div>
      </div>
    `;
  });

  container.innerHTML = html;
}

// ============== 复制全文 ==============
function copyAll() {
  const sections = document.querySelectorAll('.speech-section');
  if (sections.length === 0) return;

  let text = '';
  sections.forEach((sec, i) => {
    const title = sec.querySelector('.speech-section-title').textContent.trim();
    const content = sec.querySelector('.speech-text').innerText;
    text += `【${title}】\n${content}\n\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制到剪贴板');
  }).catch(() => {
    // fallback
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showToast('已复制到剪贴板');
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ============== 事件绑定 ==============
document.addEventListener('DOMContentLoaded', async function() {
  // 加载邀请码数据（从云端）
  const overlay = document.getElementById('inviteOverlay');
  const inviteCard = overlay.querySelector('.invite-card');
  if (inviteCard) {
    inviteCard.innerHTML = '<div style="padding:40px 20px;text-align:center;"><div style="font-size:24px;margin-bottom:12px;">⏳</div><div style="font-size:15px;color:var(--ink-light);">正在加载数据...</div></div>';
  }

  await loadInviteCodes();

  // 恢复邀请码界面
  if (inviteCard) {
    inviteCard.innerHTML = `
      <div class="logo-icon">囍</div>
      <h2>泽涛的台词智能体</h2>
      <p class="subtitle">专业婚礼台词 AI 生成</p>
      <div class="invite-error-msg" id="inviteError"></div>
      <input type="text" class="invite-input" id="inviteCode" placeholder="请输入邀请码" maxlength="20">
      <button class="invite-btn" id="inviteBtn">进 入</button>
      <div class="invite-footer">
        暂无邀请码？<a href="javascript:void(0)" onclick="alert('请联系管理员获取邀请码')">联系作者</a>
      </div>
    `;
  }

  // 邀请码验证
  if (!checkInvite()) {
    document.getElementById('inviteBtn').addEventListener('click', verifyInvite);
    document.getElementById('inviteCode').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') verifyInvite();
    });
  }

  // 风格选择
  document.querySelectorAll('.style-option').forEach(opt => {
    opt.addEventListener('click', function() {
      document.querySelectorAll('.style-option').forEach(o => o.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // 生成按钮
  document.getElementById('generateBtn').addEventListener('click', function() {
    const btn = this;
    const btnText = document.getElementById('btnText');
    btnText.innerHTML = '<span class="loading"></span>生成中...';
    btn.disabled = true;

    setTimeout(() => {
      generateSpeech();
      // 保存到历史
      const speechHtml = document.getElementById('speechContent').innerHTML;
      saveHistory(speechHtml);
      btnText.textContent = '生成完整台词稿';
      btn.disabled = false;
    }, 600);
  });

  // 换一版
  document.getElementById('regenerateBtn').addEventListener('click', function() {
    if (document.querySelectorAll('.speech-section').length > 0) {
      generateSpeech();
      const speechHtml = document.getElementById('speechContent').innerHTML;
      saveHistory(speechHtml);
      showToast('已刷新一版');
    }
  });

  // 历史记录
  document.getElementById('historyBtn').addEventListener('click', openHistoryModal);

  // 复制
  document.getElementById('copyBtn').addEventListener('click', copyAll);
});
